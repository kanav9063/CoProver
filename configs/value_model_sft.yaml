# Value Model SFT Configuration
# Llama-3.2-1B trained to predict proof state solvability

model:
  name: Llama-3.2-1B
  path: meta-llama/Llama-3.2-1B
  architecture: LlamaForCausalLM
  num_layers: 16
  hidden_size: 2048
  num_attention_heads: 32
  vocab_size: 128256

training:
  loss_type: sft_loss
  learning_rate: 2e-5
  lr_schedule: cosine
  lr_warmup_iters: 10
  weight_decay: 0.01
  optimizer: adam
  epochs: 3

data:
  train_path: /workspace/training/trajectories/all.jsonl
  input_key: prompt
  label_key: label

hardware:
  tensor_parallel: 1
  gpus: 1

wandb:
  project: lean-value-model
  group: llama-3.2-1b
